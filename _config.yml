title: "B1m3rU"
description: "Portfolio, noticias y seguridad."
theme: minima

author: "Enrique Álvarez González"

# Páginas que aparecerán en el menú superior
header_pages:
  - posts.md
  - maquinas.md
  - about.md
  - contact.md

Opcional: esquema de colores del tema minima
minima:
  skin: dark
  social_links:
    - { platform: github,  user_url: "https://github.com/B1m3rU" }
    - { platform: linkedin, user_url: "https://www.linkedin.com/in/tu-perfil/" }

# Opcional: configuración básica de enlaces y cosas del sitio
url: "https://b1m3ru.github.io/"

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

markdown: kramdown
kramdown:
  input: GFM
highlighter: rouge

