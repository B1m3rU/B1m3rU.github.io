{%- comment -%}
Sustituye al <head> del tema Minima.
Carga el CSS generado a partir de assets/main.scss y el JS de “copiar código”.
Incluye cache-buster para forzar recarga tras cada deploy.
{%- endcomment -%}
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  {%- seo -%}

  <!-- CSS principal del sitio (con cache-buster) -->
  <link
    rel="stylesheet"
    href="{{ '/assets/main.css' | relative_url }}?v={{ site.github.build_revision | default: site.time | date: '%s' }}"
  >

  <!-- Fuente monoespaciada para código -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- Botón Copiar (JS con cache-buster) -->
  <script
    defer
    src="{{ '/assets/js/copy-code.js' | relative_url }}?v={{ site.github.build_revision | default: site.time | date: '%s' }}"
  ></script>
</head>
