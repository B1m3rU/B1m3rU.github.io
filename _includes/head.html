{%- comment -%}
Este archivo sustituye al head del tema Minima y garantiza que
cargamos nuestro CSS y JS propios (copy-code.js).
{%- endcomment -%}
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  {%- seo -%}

  <!-- CSS principal del sitio -->
  <link rel="stylesheet" href="{{ '/assets/main.css' | relative_url }}">

  <!-- Fuente monoespaciada -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- Botón Copiar (forzamos recarga con cache-buster) -->
  <script defer src="{{ '/assets/js/copy-code.js' | relative_url }}?v={{ site.github.build_revision | default: site.time | date: '%s' }}"></script>
</head>
